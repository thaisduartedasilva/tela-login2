<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
</head>

<body>

    <header>
        <nav>

        </nav>
    </header>

    <main>
        <div class="container">
            <div class="shadow p-3 mb-5 bg-body rounded">
                <h2 class="d-flex justify-content-center" id="titulo">Login</h2>
                <form id="form-login">
                    <div id="c-email" class="d-flex justify-content-center mb-3">

                        <label for="email">Email: </label>
                        <input type="email" id="email" placeholder="email" required>
                    </div>
                    <div id="c-senha" class="d-flex justify-content-center mb-3">
                        <label for="senha">Senha: </label>
                        <input type="password" id="senha" placeholder="senha" required>
                    </div>
                    <div class="d-flex justify-content-center">
                        <button type="button" class="btn btn-primary mb-3">Entrar</button>
                    </div>
                </form>
                <div id="mensagem"></div>
                <div class="toggle" id="toggle"></div>
                <p class="d-flex justify-content-center mb-3 ">Não tem conta? <a href="#"
                        class="text-primary text-decoration-underline">
                        Cadastre-se!
                    </a></p>

            </div>
        </div>
    </main>

    <footer>

    </footer>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
